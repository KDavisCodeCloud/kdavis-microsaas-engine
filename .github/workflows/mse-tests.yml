name: MSE - Backend Tests

on:
  push:
    branches: [main]
    paths: ['kdavis-microsaas-engine/**']
  pull_request:
    paths: ['kdavis-microsaas-engine/**']
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kdavis-microsaas-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v
